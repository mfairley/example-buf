version: v2
plugins:
  # Message types + service descriptors (`*_pb.ts`). The output lands inside
  # the `@acme/proto` workspace package (idl/), where its `exports` field
  # publishes the generated files for consumers.
  - local: protoc-gen-es
    out: idl/gen
    opt:
      - target=ts
      - import_extension=js
